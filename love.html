<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Crush ❤</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      padding: 20px;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 1000px;
      margin-bottom: 40px;
    }
    .photo-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .photo-card:hover {
      transform: scale(1.05);
    }
    .photo-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
    .caption {
      padding: 10px;
      text-align: center;
      font-size: 1rem;
      color: #ff4d6d;
      font-weight: 600;
    }
    footer {
      color: white;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>❤ My Special Memories ❤</header>  <div class="gallery">
    <!-- Replace image1.jpg, image2.jpg with your crush's photo filenames -->
    <div class="photo-card">
      <img src="Picsart_25-12-05_09-07-23-154.jpg" alt="My Crush Photo 1">
      <div class="caption">Tumhari smile sabse pyari hai 💕</div>
    </div>
    <div class="photo-card">
      <img src="IMG_20251223_024148.jpg" alt="My Crush Photo 2">
      <div class="caption">Har photo mein tum khaas ho ✨</div>
    </div>
    <div class="photo-card">
      <img src="p.jpg" alt="My Crush Photo 3">
      <div class="caption">Dil se sambhal ke rakha hai ❤</div>
    </div>
  </div>  <footer>Made with ❤ by Dushyant</footer>
</body>
</html>
